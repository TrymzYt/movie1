<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LO Cinema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    width: 100vw; height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  #bg {
    position: fixed; inset: 0;
    background-image: url('https://image.tmdb.org/t/p/w1280/uDO8zWDhfWwoFdKS4fzkUJt0Rf0.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.1);
    transform: scale(1.05);
    z-index: 0;
  }

  #card {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 56px;
    padding: 40px 60px;
  }

  #poster {
    height: 78vh;
    max-height: 520px;
    width: auto;
    border-radius: 6px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 0 0.5px rgba(255,255,255,0.08);
    flex-shrink: 0;
    display: block;
  }

  #info {
    display: flex; flex-direction: column;
    gap: 24px;
    flex: 1;
    max-width: 320px;
  }

  #cinema-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  #divider {
    width: 32px; height: 0.5px;
    background: rgba(255,255,255,0.15);
  }

  #tonight-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  #title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    font-style: italic;
    color: #fff;
    line-height: 1.1;
    letter-spacing: 0.01em;
  }

  #year-runtime {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #no-seats {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 99px;
    padding: 7px 18px;
    display: inline-block;
    width: fit-content;
  }

  #showtime-wrap {
    display: flex; flex-direction: column;
    gap: 6px;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    padding-top: 22px;
    margin-top: 4px;
  }

  #showtime-label {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #showtime {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  #footer-note {
    font-size: 10px;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.06em;
    line-height: 1.9;
  }
</style>
</head>
<body>

<div id="bg"></div>

<div id="card">
  <img id="poster" src="https://image.tmdb.org/t/p/w500/uDO8zWDhfWwoFdKS4fzkUJt0Rf0.jpg" alt="La La Land" />

  <div id="info">
    <div id="cinema-name">LO Cinema</div>
    <div id="divider"></div>
    <div id="tonight-label">Tonight's Screening</div>
    <div id="title">La La Land</div>
    <div id="year-runtime">2016 &nbsp;·&nbsp; 128 min &nbsp;·&nbsp; Drama / Musical</div>
    <div id="no-seats">✦ All seats reserved ✦</div>
    <div id="showtime-wrap">
      <div id="showtime-label">Showtime</div>
      <div id="showtime">20:30</div>
      <div id="footer-note">Private screening &nbsp;·&nbsp; LO Cinema<br>Please silence your phone</div>
    </div>
  </div>
</div>

</body>
</html>
